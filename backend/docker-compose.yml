services:
  postgres:
    image: postgres:16
    container_name: flora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flora_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - flora_postgres_data:/var/lib/postgresql/data

volumes:
  flora_postgres_data:
